<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gregório e Morais | Ferramentas</title>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: #ffffff;
    --accent: #1d4ed8;
    --accent-light: #3b82f6;
    --text: #1e293b;
    --muted: #64748b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    color: var(--text);
    padding: 48px 20px;
  }

  .wrapper {
    max-width: 880px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    color: #f8fafc;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 2rem;
    margin: 0 0 8px;
  }

  header p {
    margin: 0;
    color: #cbd5e1;
    font-size: 1rem;
  }

  section {
    margin-bottom: 36px;
  }

  section h2 {
    color: #f1f5f9;
    font-size: 1.2rem;
    font-weight: 600;
    margin: 0 0 16px;
    padding-left: 4px;
    border-left: 4px solid var(--accent-light);
    line-height: 1.4;
    padding-left: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  a.card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card-bg);
    border-radius: 14px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  a.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
  }

  a.card .icon {
    font-size: 1.8rem;
    line-height: 1;
  }

  a.card .label {
    font-weight: 600;
    font-size: 1rem;
  }

  footer {
    text-align: center;
    color: #94a3b8;
    font-size: 0.85rem;
    margin-top: 48px;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>Gregório e Morais</h1>
      <p>Escolha a ferramenta que deseja utilizar</p>
    </header>

    <section>
      <h2>Gerador de Arquivos</h2>
      <div class="grid">
        <a class="card" href="https://gregorioemorais.github.io/ciencia-audiencia/">
          <span class="icon">📅</span>
          <span class="label">Ciência de Audiência</span>
        </a>
        <a class="card" href="https://gregorioemorais.github.io/honorarios/">
          <span class="icon">💰</span>
          <span class="label">Contrato de Honorários</span>
        </a>
        <a class="card" href="https://gregorioemorais.github.io/hipossuficiencia/">
          <span class="icon">📄</span>
          <span class="label">Hipossuficiência</span>
        </a>
        <a class="card" href="https://gregorioemorais.github.io/procuracao/">
          <span class="icon">✍️</span>
          <span class="label">Procuração</span>
        </a>
      </div>
    </section>

    <section>
      <h2>Outras Ferramentas</h2>
      <div class="grid">
        <a class="card" href="https://gregorioemorais.github.io/main/scripts/central-guias-backup-viewer.html">
          <span class="icon">🗂️</span>
          <span class="label">Scripts: Central de Guias</span>
        </a>
        <a class="card" href="https://gregorioemorais.github.io/controle-pagamentos/">
          <span class="icon">💳</span>
          <span class="label">Controle de Pagamentos</span>
        </a>
      </div>
    </section>

    <footer>
      Gregório e Morais Advocacia
    </footer>
  </div>
</body>
</html>
