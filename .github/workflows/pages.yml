name: Publicar OfficeJur

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/validador-projudi/package-lock.json

      - name: Montar Validador Projudi
        working-directory: apps/validador-projudi
        run: npm ci && npm run check

      - name: Testar regras financeiras
        working-directory: apps/financeiro
        run: npm test

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Montar site estático
        run: ./scripts/build-site.sh

      - name: Validar site publicado
        run: node ./scripts/validate-site.mjs

      - name: Enviar artefato do site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
