<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17213a">
    <meta name="msapplication-TileColor" content="#17213a">
    <meta name="application-name" content="OfficeJur">
    <meta name="apple-mobile-web-app-title" content="OfficeJur">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gerador de Declaração de Hipossuficiência</title>
    <link rel="icon" href="../../assets/app-icon.png" data-officejur-href="office.appIconUrl" type="image/png">
    <link rel="apple-touch-icon" href="../../assets/app-icon.png" data-officejur-href="office.appIconUrl">
    <script src="../../assets/office-config.js"></script>
    <script src="../../assets/office-context.js" defer></script>
    <link rel="stylesheet" href="../assets/styles.css?v=1">
    <script src="../assets/jspdf.umd.min.js"></script>
    <script src="../assets/app-switcher.js?v=4" defer></script>
    <script src="../assets/modal-scroll-lock.js?v=1" defer></script>
    <script src="../assets/document-header.js?v=1" defer></script>
    <script src="./assets/app.js?v=4" defer></script>
    <script src="../assets/site-footer.js?v=5" defer></script>
  </head>
  <body>
    <office-document-header title="Hipossuficiência" current="hipossuficiencia" aria-label="Gerador de Declaração de Hipossuficiência"></office-document-header>

    <main class="workspace">
      <section class="form-pane" aria-label="Dados da declaração">
        <div class="mode-switch" role="radiogroup" aria-label="Tipo da declaração">
          <button type="button" data-mode="normal" class="is-active">Normal</button>
          <button type="button" data-mode="under16">Menor de 16</button>
          <button type="button" data-mode="over16">Maior de 16</button>
        </div>

        <form id="document-form" autocomplete="on">
          <fieldset>
            <legend>Declarante</legend>
            <div class="field-grid">
              <label id="person-type-field" class="span-2">Tipo de pessoa<select name="person.type"><option value="pf">Pessoa física</option><option value="pj">Pessoa jurídica</option></select></label>
              <label class="span-2" data-person-kind="pf">Nome completo<input name="person.name" autocomplete="name"></label>
              <label data-person-kind="pf">Nacionalidade<input name="person.nationality"></label>
              <label data-person-kind="pf">Estado civil<input name="person.maritalStatus"></label>
              <label data-person-kind="pf">Profissão<input name="person.profession"></label>
              <label data-person-kind="pf">RG<input name="person.rg"></label>
              <label data-person-kind="pf">Órgão expedidor<input name="person.rgIssuer"></label>
              <label data-person-kind="pf">CPF<input name="person.cpf" inputmode="numeric"></label>
              <label class="span-2" data-person-kind="pj">Razão social<input name="person.companyName"></label>
              <label data-person-kind="pj">Nome fantasia<input name="person.tradeName"></label>
              <label data-person-kind="pj">CNPJ<input name="person.cnpj" inputmode="numeric"></label>
              <label class="span-2" data-person-kind="pj">Representante legal<input name="person.representativeName"></label>
              <label data-person-kind="pj">Cargo/qualidade<input name="person.representativeRole"></label>
              <label data-person-kind="pj">CPF do representante<input name="person.representativeCpf" inputmode="numeric"></label>
              <label class="span-2">E-mail<input name="person.email" type="email" autocomplete="email"></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Endereço do declarante</legend>
            <div class="field-grid">
              <label class="span-2">Logradouro<input name="person.street" autocomplete="street-address"></label>
              <label>Número<input name="person.number"></label>
              <label>Complemento<input name="person.complement"></label>
              <label>Bairro<input name="person.neighborhood"></label>
              <label>Cidade<input name="person.city" autocomplete="address-level2"></label>
              <label>UF<input name="person.state" maxlength="2" autocomplete="address-level1"></label>
              <label>CEP<input name="person.zip" inputmode="numeric" autocomplete="postal-code"></label>
            </div>
          </fieldset>

          <fieldset id="guardian-section" hidden>
            <legend id="guardian-title">Representante</legend>
            <div class="field-grid">
              <label class="span-2">Nome completo<input name="guardian.name"></label>
              <label>Qualidade
                <select name="guardian.relation">
                  <option value="">Não informar</option>
                  <option value="genitor">Genitor</option>
                  <option value="genitora">Genitora</option>
                  <option value="tutor">Tutor</option>
                  <option value="tutora">Tutora</option>
                  <option value="curador">Curador</option>
                  <option value="curadora">Curadora</option>
                </select>
              </label>
              <label>Nacionalidade<input name="guardian.nationality"></label>
              <label>Estado civil<input name="guardian.maritalStatus"></label>
              <label>Profissão<input name="guardian.profession"></label>
              <label>RG<input name="guardian.rg"></label>
              <label>Órgão expedidor<input name="guardian.rgIssuer"></label>
              <label>CPF<input name="guardian.cpf" inputmode="numeric"></label>
              <label class="span-2">E-mail<input name="guardian.email" type="email"></label>
              <label class="span-2">Logradouro<input name="guardian.street"></label>
              <label>Número<input name="guardian.number"></label>
              <label>Complemento<input name="guardian.complement"></label>
              <label>Bairro<input name="guardian.neighborhood"></label>
              <label>Cidade<input name="guardian.city"></label>
              <label>UF<input name="guardian.state" maxlength="2"></label>
              <label>CEP<input name="guardian.zip" inputmode="numeric"></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Fechamento</legend>
            <div class="field-grid">
              <label>Local<input name="document.location" value="Silvânia/GO"></label>
              <label>Data<input name="document.date" type="date"></label>
              <label class="span-2">Nome do arquivo<input name="document.filename" value="hipossuficiencia"></label>
            </div>
          </fieldset>
        </form>
      </section>

      <section class="preview-pane" aria-label="Prévia do PDF">
        <header><strong>Prévia</strong><span id="page-count">A4</span></header>
        <iframe id="preview" title="Prévia da declaração"></iframe>
        <div id="preview-loading" class="preview-loading">Gerando prévia…</div>
      </section>
    </main>
    <office-site-footer repository="officejur"></office-site-footer>
  </body>
</html>
