<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#17213a">
  <meta name="msapplication-TileColor" content="#17213a">
  <meta name="application-name" content="OfficeJur">
  <meta name="apple-mobile-web-app-title" content="OfficeJur">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lab | OfficeJur</title>
  <link rel="icon" href="../assets/app-icon.png" data-officejur-href="office.appIconUrl" type="image/png">
  <link rel="apple-touch-icon" href="../assets/app-icon.png" data-officejur-href="office.appIconUrl">
  <script src="../assets/office-config.js"></script>
  <script src="../assets/office-context.js" defer></script>
  <script src="./assets/catalog.js?v=1" defer></script>
  <script src="./assets/app-switcher.js?v=4" defer></script>
  <script src="./assets/modal-scroll-lock.js?v=1" defer></script>
  <script src="./assets/site-footer.js?v=5" defer></script>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f5ff;
      --muted: #c9c2dc;
      --line: rgba(255,255,255,.14);
      --violet: #9e77ed;
      --violet-light: #d6bbfb;
      --panel: rgba(255,255,255,.075);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background:
        radial-gradient(circle at 18% 5%, rgba(158,119,237,.26), transparent 28rem),
        radial-gradient(circle at 90% 35%, rgba(215,187,121,.12), transparent 24rem),
        linear-gradient(145deg, #17122b, #17213a 62%, #111827);
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background-image: radial-gradient(rgba(255,255,255,.12) .7px, transparent .7px);
      background-size: 24px 24px;
      mask-image: linear-gradient(180deg, #000, transparent 88%);
    }

    .shell {
      position: relative;
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: inherit;
      text-decoration: none;
    }

    .brand img { width: 46px; height: 46px; object-fit: contain; }
    .brand strong, .brand span { display: block; }
    .brand strong { font-family: Georgia, "Times New Roman", serif; font-size: 17px; }
    .brand span { margin-top: 2px; color: var(--muted); font-size: 11px; font-weight: 700; }

    .hero {
      max-width: 760px;
      padding: 92px 0 58px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      color: var(--violet-light);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .eyebrow::before { width: 28px; height: 1px; background: currentColor; content: ""; }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(54px, 10vw, 92px);
      font-weight: 600;
      letter-spacing: -.035em;
      line-height: .92;
    }

    h1 em { color: var(--violet-light); font-style: italic; }

    .hero p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .catalog-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    h2 { margin: 0; font-family: Georgia, "Times New Roman", serif; font-size: 25px; }
    .catalog-head span { color: var(--muted); font-size: 12px; font-weight: 700; }

    .tools {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .tool {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      min-height: 174px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 22px;
      color: inherit;
      background: var(--panel);
      box-shadow: 0 22px 54px rgba(0,0,0,.2);
      text-decoration: none;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .tool:hover {
      border-color: rgba(214,187,251,.55);
      background: rgba(255,255,255,.105);
      transform: translateY(-3px);
    }

    .tool:focus-visible { outline: 3px solid rgba(158,119,237,.5); outline-offset: 3px; }

    .tool-icon {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(214,187,251,.35);
      border-radius: 10px;
      color: var(--violet-light);
      background: rgba(158,119,237,.12);
      font-size: 20px;
    }

    .tool-icon svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-copy { align-self: stretch; display: flex; flex-direction: column; }
    .tool-copy strong { font-size: 17px; line-height: 1.25; }
    .tool-copy p { margin: 9px 0 18px; color: var(--muted); font-size: 13px; line-height: 1.5; }

    .status {
      align-self: end;
      width: max-content;
      margin-top: auto;
      border: 1px solid rgba(214,187,251,.25);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--violet-light);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .arrow { color: var(--violet-light); font-size: 21px; line-height: 1; }

    .empty {
      grid-column: 1 / -1;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 720px) {
      .shell { width: min(100% - 28px, 1040px); padding-top: 22px; }
      .hero { padding: 68px 0 44px; }
      .tools { grid-template-columns: 1fr; }
      .catalog-head { align-items: flex-start; flex-direction: column; gap: 4px; }
    }

    @media (prefers-reduced-motion: reduce) { .tool { transition: none; } }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="../">
        <img src="../assets/logo-white.png" data-officejur-src="office.logoWhiteUrl" alt="">
        <span><strong>OfficeJur</strong><span data-officejur-field="office.shortName">Escritório</span></span>
      </a>
      <office-app-switcher current="lab"></office-app-switcher>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">Área experimental</p>
        <h1>OfficeJur <em>Lab</em></h1>
        <p>Um espaço isolado para testar ferramentas, validar ideias e manter recursos temporários acessíveis sem transformá-los em módulos permanentes do sistema.</p>
      </section>

      <section aria-labelledby="tools-title">
        <div class="catalog-head">
          <h2 id="tools-title">Ferramentas disponíveis</h2>
          <span id="tool-count"></span>
        </div>
        <div class="tools" id="tools"></div>
      </section>
    </main>

    <office-site-footer repository="officejur" embedded></office-site-footer>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const tools = Array.isArray(window.OFFICEJUR_LAB_TOOLS) ? window.OFFICEJUR_LAB_TOOLS : [];
      const container = document.querySelector('#tools');
      const count = document.querySelector('#tool-count');
      const icons = {
        'credit-card': '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 10h18M7 15h3"></path></svg>',
        'folder-tree': '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h7l2 2h9v12H3zM7 11h10M7 15h7"></path></svg>'
      };

      count.textContent = `${tools.length} ${tools.length === 1 ? 'ferramenta em teste' : 'ferramentas em teste'}`;
      if (!tools.length) {
        container.innerHTML = '<p class="empty">Nenhuma ferramenta está disponível no Lab neste momento.</p>';
        return;
      }

      for (const tool of tools) {
        const link = document.createElement('a');
        link.className = 'tool';
        link.href = tool.href;

        const icon = document.createElement('span');
        icon.className = 'tool-icon';
        icon.innerHTML = icons[tool.icon] || icons['folder-tree'];

        const copy = document.createElement('span');
        copy.className = 'tool-copy';
        const name = document.createElement('strong');
        name.textContent = tool.name;
        const description = document.createElement('p');
        description.textContent = tool.description;
        const status = document.createElement('span');
        status.className = 'status';
        status.textContent = tool.status;
        copy.append(name, description, status);

        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.setAttribute('aria-hidden', 'true');
        arrow.textContent = '→';
        link.append(icon, copy, arrow);
        container.append(link);
      }
    });
  </script>
</body>
</html>
